                    <div className="hidden md:flex items-center gap-6">

        const SideBar = ({ activeMode, setActiveMode, searchQuery, onSearch, isOpen, onClose }) => {

            useEffect(() => {

            },[searchQuery]);

                onSearch(localSearch);
                if(window.innerWidth < 768) onClose();
            };

                if (e.key === 'Enter') {
                    triggerSearch();
                }
            };

                if (activeMode === mode) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setActiveMode(mode);
                    window.scrollTo({ top: 0 }); 
                }
                if(window.innerWidth < 768) onClose();
            };

                                onMouseDown={(e) => e.preventDefault()}

        const CategoryBar = ({ categories, activeCategory, onSelect }) => {
            const tabsRef = useRef([]);
            const[indicatorStyle, setIndicatorStyle] = useState({ left: 0, width: 0, opacity: 0 });
            
            useEffect(() => {
                const calculate = () => {
                    const idx = categories.findIndex(c => c.id === activeCategory);
                    const tab = tabsRef.current[idx];
                    if (tab) {
                        setIndicatorStyle({ left: tab.offsetLeft, width: tab.offsetWidth, opacity: 1 });
                    }
                };
                
                calculate();
                if (document.fonts && document.fonts.ready) {
                    document.fonts.ready.then(calculate);
                }
                
                window.addEventListener('resize', calculate);
                const timer1 = setTimeout(calculate, 150);
                const timer2 = setTimeout(calculate, 400);

                return () => {

        const App = () => {
            const [activeMode, setActiveMode] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                return params.get('mode') === 'topics' ? 'topics' : 'fonts'; 
            }); 
            
            const[activeFontCategory, setActiveFontCategory] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('q')) return 'all';
                return (params.get('mode') !== 'topics' && params.get('cat')) ? params.get('cat') : 'all';
            });

            const[activeTopicCategory, setActiveTopicCategory] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('q')) return 'all';
                return (params.get('mode') === 'topics' && params.get('cat')) ? params.get('cat') : 'all';
            });

            const[searchQuery, setSearchQuery] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                return params.get('q') || '';
            });

            const [isDark, setIsDark] = useState(false); 
            
            const[downloadModalData, setDownloadModalData] = useState(null);
            const[detailModalData, setDetailModalData] = useState(null);

            const[isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const[visibleCount, setVisibleCount] = useState(42); 
            const ITEMS_PER_PAGE = 42;

            const handleSearch = (query) => {
                setSearchQuery(query);
                if (query.trim() !== '') {
                    if (activeMode === 'topics') {
                        setActiveTopicCategory('all');
                    } else {
                        setActiveFontCategory('all');
                    }
                }
            };

            const handleFontCategoryChange = (cat) => {
                setActiveFontCategory(cat);
                setSearchQuery('');
            };

            const handleTopicCategoryChange = (cat) => {
                setActiveTopicCategory(cat);
                setSearchQuery('');
            };

            useEffect(() => {
                const url = new URL(window.location);
                url.searchParams.set('mode', activeMode);

                const currentCat = activeMode === 'topics' ? activeTopicCategory : activeFontCategory;
                if (currentCat !== 'all') {
                    url.searchParams.set('cat', currentCat);
                } else {
                    url.searchParams.delete('cat'); 
                }

                if (searchQuery.trim()) {
                    url.searchParams.set('q', searchQuery.trim());
                } else {
                    url.searchParams.delete('q');
                }

                window.history.replaceState({}, '', url);
            },[activeMode, activeTopicCategory, activeFontCategory, searchQuery]);

            useEffect(() => {
                setVisibleCount(ITEMS_PER_PAGE);
            },[activeMode, activeTopicCategory, activeFontCategory, searchQuery]);

            const toggleTheme = () => {
                setIsDark(!isDark);
                document.documentElement.classList.toggle('dark');
            };
            
            const displayData = useMemo(() => {
                if (activeMode === 'topics') {
                    let data = TOPICS_DATA.ITEMS ||[];
                    if (searchQuery.trim()) data = data.filter(i => i.title.toLowerCase().includes(searchQuery.toLowerCase()));
                    if (activeTopicCategory !== 'all') data = data.filter(i => i.category === activeTopicCategory);
                    return data;
                } else {
                    let data = FONTS_DATA.ITEMS ||[];
                    if (searchQuery.trim()) data = data.filter(i => i.name.toLowerCase().includes(searchQuery.toLowerCase()));
                    if (activeFontCategory !== 'all') data = data.filter(i => i.category === activeFontCategory);
                    return data;
                }
            },[activeMode, activeTopicCategory, activeFontCategory, searchQuery]);

            const paginatedData = displayData.slice(0, visibleCount);

            const handleLoadMore = () => {
                setVisibleCount(prev => prev + ITEMS_PER_PAGE);
            };

            const totalFontsCount = FONTS_DATA.ITEMS ? FONTS_DATA.ITEMS.length : 0;

            return (
                <div className="min-h-screen font-sans flex flex-col relative">
                    
                    <TopBar 
                        isDark={isDark} 
                        toggleTheme={toggleTheme} 
                        onMenuClick={() => setIsMobileMenuOpen(true)}
                    />
                    
                    <div className="flex flex-col md:flex-row pt-14 flex-1">
                        
                        <SideBar 
                            activeMode={activeMode} 
                            setActiveMode={setActiveMode} 
                            searchQuery={searchQuery}
                            onSearch={handleSearch}
                            isOpen={isMobileMenuOpen}
                            onClose={() => setIsMobileMenuOpen(false)}
                        />

                                    activeMode={activeMode} 
                                    totalCount={totalFontsCount} 
                                />

                                    categories={activeMode === 'topics' ? TOPICS_DATA.CATEGORIES : FONTS_DATA.CATEGORIES} 
                                    activeCategory={activeMode === 'topics' ? activeTopicCategory : activeFontCategory} 
                                    onSelect={activeMode === 'topics' ? handleTopicCategoryChange : handleFontCategoryChange} 
                                />

                                <div className="flex-1 w-full mt-2">
                                    {displayData.length === 0 ? (
                                        <div className="text-left py-24 text-gray-400 dark:text-gray-500 flex flex-col items-start gap-4 animate-in fade-in duration-500">
                                            {activeMode === 'topics' 
                                                ? <Icons.Layers size={48} className="opacity-20 animate-pulse" /> 
                                                : <Icons.Type size={48} className="opacity-20 animate-pulse" />

                                                    ? 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5' 
                                                    : 'grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 3xl:grid-cols-7'
                                                }`}>
                                                {paginatedData.map(item => (
                                                    activeMode === 'topics' 
                                                        ? <TopicCard key={item.id} item={item} onOpenDownload={setDownloadModalData} />
                                                        : <FontCard key={item.id} item={item} onOpenDetail={setDetailModalData} onOpenDownload={setDownloadModalData} />
                                                ))}
                                            </div>

                                            {visibleCount < displayData.length && (
                                                <div className="flex justify-center mt-12 pb-8 animate-in fade-in duration-500">
                                                    <button 
                                                        onClick={handleLoadMore} 
                                                        className="px-6 py-3 rounded-full bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-white/10 text-gray-700 dark:text-gray-300 font-bold text-sm shadow-sm hover:shadow-md hover:-translate-y-0.5 active:translate-y-0 active:scale-95 transition-all duration-300 flex items-center gap-2"
                                                    >
                                                        加载更多
                                                        <Icons.ChevronDown size={16} strokeWidth={2.5} />
                                                    </button>
                                                </div>
                                            )}
                                        </>
                                    )}
                                </div>
                            </div>
                        </main>
                    </div>

                    <DownloadModal 
                        isOpen={!!downloadModalData} 
                        onClose={() => setDownloadModalData(null)} 
                        data={downloadModalData} 
                    />

                    <FontDetailModal 
                        isOpen={!!detailModalData} 
                        onClose={() => setDetailModalData(null)} 
                        font={detailModalData} 
                        onOpenDownload={setDownloadModalData} 
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
